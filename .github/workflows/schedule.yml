name: Quant Bot Daily Report

on:
  schedule:
    # 每天 UTC 時間 00:00 (台灣早上 08:00) 與 04:00 (台灣中午 12:00) 執行
    - cron: '0 0,4 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 取得最新程式碼
        uses: actions/checkout@v4
      
      - name: 在雲端建立乾淨的 Python 3.10 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: 安裝所有金融與分析套件
        run: pip install -r requirements.txt
        
      - name: 🚀 發射！執行量化機器人發報程式
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
