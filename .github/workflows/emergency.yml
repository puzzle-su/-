name: Emergency Bottom-Fishing Monitor

on:
  schedule:
    # 全天候 24 小時，每 1 小時檢查追蹤一次
    - cron: '0 * * * *'
  workflow_dispatch: # 允許手動點擊測試

jobs:
  emergency-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 取得最新程式碼
        uses: actions/checkout@v4
      
      - name: 在雲端建立環境
        uses: actions/setup-python@v5
        with:
            python-version: '3.10'
            cache: 'pip'
          
      - name: 安裝所有分析套件
        run: pip install -r requirements.txt
        
      - name: 🚨 執行盤中緊急抄底監控
        env:
            TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --emergency
